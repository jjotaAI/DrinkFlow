version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: drinkflow-db
    environment:
      POSTGRES_USER: drinkflow
      POSTGRES_PASSWORD: drinkflow123
      POSTGRES_DB: drinkflow
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  main-service:
    build: ./main-service
    container_name: drinkflow-main
    env_file:
      - ./main-service/.env
    ports:
      - "3000:3000"
    depends_on:
      - postgres

  report-service:
    build: ./report-service
    container_name: drinkflow-report
    env_file:
      - ./report-service/.env
    ports:
      - "3001:3001"
    depends_on:
      - postgres

volumes:
  pgdata: