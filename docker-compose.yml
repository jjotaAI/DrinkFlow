version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: drinkflow-db
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  main-service:
    build: ./main-service
    container_name: drinkflow-main
    env_file:
      - .env
    ports:
      - "${MAIN_PORT}:3000"
    depends_on:
      - postgres

  report-service:
    build: ./report-service
    container_name: drinkflow-report
    env_file:
      - .env
    ports:
      - "${REPORT_PORT}:3001"
    depends_on:
      - postgres

volumes:
  pgdata: